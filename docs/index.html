<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国土交通省 交通量ビューワー（JARTIC提供）</title>
    <script type="module" crossorigin src="/japan-jartic-traffic-data/assets/index-xOmVly71.js"></script>
    <link rel="modulepreload" crossorigin href="/japan-jartic-traffic-data/assets/maplibre-CEzeW31l.js">
    <link rel="modulepreload" crossorigin href="/japan-jartic-traffic-data/assets/pmtiles-D2IMUaje.js">
    <link rel="stylesheet" crossorigin href="/japan-jartic-traffic-data/assets/index-Dz4yTrF4.css">
    <style>
      #attribution {
        position: absolute;
        bottom: 24px;
        left: 8px;
        font-size: 10px;
        color: #333;
        background: rgba(255,255,255,0.75);
        padding: 2px 6px;
        border-radius: 3px;
        z-index: 5;
        pointer-events: auto;
      }
      #attribution a { color: #1a73e8; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="panel">
        <div id="panel-header">
          <h1>国土交通省 交通量ビューワー<br>（JARTIC提供）</h1>
          <div id="mode-tabs">
            <button class="tab" data-mode="5m">5分間</button>
            <button class="tab active" data-mode="1h">1時間</button>
          </div>
        </div>

        <!-- 5分間モード -->
        <div id="panel-5m" class="mode-panel hidden">
          <div id="date-select-row">
            <label>日付</label>
            <select id="sel-year"></select>年
            <select id="sel-month"></select>月
            <select id="sel-day"></select>日
          </div>
          <div id="slider-row">
            <span id="timecode-label-5m">--:--</span>
            <input type="range" id="slider-5m" min="0" max="287" value="0" />
          </div>
          <div id="play-row">
            <button id="btn-play-5m">▶ 再生</button>
            <label>速度
              <select id="sel-speed-5m">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="4" selected>4x</option>
                <option value="8">8x</option>
                <option value="12">12x</option>
              </select>
            </label>
          </div>
        </div>

        <!-- 1時間モード -->
        <div id="panel-1h" class="mode-panel">
          <div id="loading-row" class="hidden">
            <span id="loading-label">データ読み込み中...</span>
            <div id="loading-bar"><div id="loading-progress"></div></div>
          </div>
          <div id="slider-row-1h">
            <span id="timecode-label-1h">----/--/-- --:--</span>
            <input type="range" id="slider-1h" min="0" max="2183" value="0" />
          </div>
          <div id="play-row-1h">
            <button id="btn-play-1h">▶ 再生</button>
            <label>速度
              <select id="sel-speed-1h">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="4" selected>4x</option>
                <option value="8">8x</option>
                <option value="12">12x</option>
              </select>
            </label>
          </div>
        </div>

        <!-- 凡例 -->
        <div id="direction-tabs">
          <button class="dir-tab active" data-dir="up">上り</button>
          <button class="dir-tab" data-dir="down">下り</button>
        </div>
        <div id="legend">
          <div class="legend-title">交通量（台）</div>
          <div class="legend-scale"></div>
        </div>
        <div id="status">観測点: 2,060ヶ所</div>
      </div>
    </div>
    <div id="attribution">出典：<a href="https://www.jartic-open-traffic.org/" target="_blank">国土交通省 JARTIC オープン交通データ</a>（参考値）</div>
  </body>
</html>
